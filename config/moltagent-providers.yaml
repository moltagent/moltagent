# MoltAgent Provider Configuration
# Providers are tried in the order listed for each role

# Provider definitions
providers:
  # Local - always available (sovereign/free)
  ollama-local:
    adapter: ollama
    endpoint: http://YOUR_OLLAMA_IP:11434
    model: phi4-mini

  # Premium tier - Claude Opus (deep reasoning, complex writing)
  anthropic-claude:
    adapter: anthropic
    credentialName: claude-api-key
    model: claude-opus-4-6
    costModel:
      type: per_token
      inputPer1M: 15.00
      outputPer1M: 75.00

  # Workhorse tier - Claude Sonnet (tools, coding, research at lower cost)
  claude-sonnet:
    adapter: anthropic
    credentialName: claude-api-key
    model: claude-sonnet-4-5-20250929
    costModel:
      type: per_token
      inputPer1M: 3.00
      outputPer1M: 15.00

  # Synthesis tier - Claude Haiku (fast synthesis at low cost)
  claude-haiku:
    adapter: anthropic
    credentialName: claude-api-key
    model: claude-haiku-4-5-20251001
    costModel:
      type: per_token
      inputPer1M: 0.80
      outputPer1M: 4.00

  # DeepSeek - available but not active on Prime
  # To enable: uncomment and set deepseek-api-key in NC Passwords
  # deepseek:
  #   adapter: deepseek
  #   credentialName: deepseek-api-key
  #   model: deepseek-chat
  #   costModel:
  #     type: per_token
  #     inputPer1M: 0.14
  #     outputPer1M: 0.28

# Role assignments (providers tried in order listed)
roles:
  sovereign: [ollama-local]
  free: [ollama-local]
  value: [claude-sonnet, ollama-local]
  premium: [anthropic-claude, claude-sonnet, ollama-local]

# Fallback chains
fallbackChain:
  ollama-local: []
  anthropic-claude: [claude-sonnet, ollama-local]
  claude-sonnet: [ollama-local]
  claude-haiku: [ollama-local]

# Search provider configuration
search:
  default_provider: searxng
  fallback_provider: null
  european_only: false
  searxng:
    url: http://localhost:8080
    engines_default: [duckduckgo, brave, stract, mojeek, wikipedia, stackoverflow]
    engines_eu: [stract, qwant, mojeek, metager, wikipedia]
    timeout_ms: 5000
    format: json
  max_results: 10
  cache_ttl_minutes: 60
