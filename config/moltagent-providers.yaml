# Role assignments (providers tried in order listed)
roles:
  sovereign: [ollama-local]
  free: [ollama-local]
  value: [ollama-local]
  premium: [ollama-local]

# Fallback chains
fallbackChain:
  ollama-local: []

# Daily budget limits in USD
budgets:
  daily: {}
  monthly: {}
