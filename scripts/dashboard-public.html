function StatusDot({ status, size = 9, style = {} }) {
  const c = STATUS_COLORS[status] || NODE_STATUS_C[status] || "#d1d5db";
  return <span style={{ display: "inline-block", width: size, height: size, borderRadius: "50%",
    background: c, boxShadow: `0 0 6px ${c}`, flexShrink: 0, ...style }} />;
}

function StatusBadge({ status }) {
  const c = STATUS_COLORS[status] || "#d1d5db";
  return (
    <span style={{ fontSize: 12.5, color: c, background: c + "18", padding: "1px 5px",
      borderRadius: 2, letterSpacing: "0.08em", fontFamily: "'Barlow Condensed',sans-serif",
      textTransform: "uppercase", fontWeight: 600 }}>{status}</span>
  );
}

function ProgressBar({ value, max, color = "#22c55e" }) {
  return (
    <div style={{ width: "100%", height: 5, background: "#1f2937", borderRadius: 2, overflow: "hidden" }}>
      <div style={{ width: `${Math.round(value / max * 100)}%`, height: "100%", background: color,
        borderRadius: 2, transition: "width 1s ease", boxShadow: `0 0 8px ${color}` }} />
    </div>
  );
}

function SegmentedBar({ segments, height = 6 }) {
  const total = segments.reduce((s, seg) => s + seg.count, 0);
  return (
    <div style={{ display: "flex", width: "100%", height, borderRadius: 2, overflow: "hidden", gap: 1 }}>
      {segments.map((seg, i) => (
        <div key={i} style={{ width: `${(seg.count / total) * 100}%`, height: "100%",
          background: seg.color, minWidth: seg.count > 0 ? 2 : 0 }} />
      ))}
    </div>
  );
}

function Card({ title, accent = "#f59e0b", children, style = {} }) {
  return (
    <div style={{ background: "#0f1117", border: "1px solid #1f2937", borderTop: `2px solid ${accent}`,
      borderRadius: 4, padding: "14px 16px", display: "flex", flexDirection: "column", ...style }}>
      <div style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 17.5, letterSpacing: "0.15em",
        textTransform: "uppercase", color: accent, marginBottom: 12, fontWeight: 600, flexShrink: 0 }}>{title}</div>
      {children}
    </div>
  );
}

function Ticker() {
  const [idx, setIdx] = useState(0);
  const [vis, setVis] = useState(true);
  useEffect(() => {
    const iv = setInterval(() => {
      setVis(false);
      setTimeout(() => { setIdx(i => (i + 1) % TICKER_MSGS.length); setVis(true); }, 400);
    }, 3500);
    return () => clearInterval(iv);
  }, []);
  return (
    <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 18.8, color: "#22c55e",
      opacity: vis ? 1 : 0, transition: "opacity 0.3s", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
      {TICKER_MSGS[idx]}
    </div>
  );
}

function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const iv = setInterval(() => setT(new Date()), 1000); return () => clearInterval(iv); }, []);
  return <span style={{ fontFamily: "monospace", fontSize: 18.8, color: "#d1d5db" }}>
    {t.toISOString().replace("T", " ").slice(0, 19)} UTC
  </span>;
}

function edgePath(fn, tn) {
  const fx = fn.x + fn.w / 2, fy = fn.y + fn.h / 2, tx = tn.x + tn.w / 2, ty = tn.y + tn.h / 2;
  if (Math.abs(ty - fy) < 38) return `M ${fx} ${fy} Q ${(fx + tx) / 2} ${fy - 22}, ${tx} ${ty}`;
  const mid = (fy + ty) / 2;
  return `M ${fx} ${fy} C ${fx} ${mid}, ${tx} ${mid}, ${tx} ${ty}`;
}

function ArchitectureView({ liveStatus }) {

  useEffect(() => { const check = () => setIsMobile(window.innerWidth < 768); check(); window.addEventListener("resize", check); return () => window.removeEventListener("resize", check); }, []);

  // Merge live node statuses from manifest
  const archNodes = liveStatus?.architecture_nodes;
  const nodes = archNodes ? NODES.map(n => archNodes[n.id] ? { ...n, status: archNodes[n.id].status } : n) : NODES;

  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  const active = hovered || selected;
  const connectedIds = active ? new Set(EDGES.filter(e => e.from === active || e.to === active).flatMap(e => [e.from, e.to])) : new Set();
  const selectedNode = selected ? nodeMap[selected] : null;

  if (isMobile) {

                        <StatusBadge status={node.status} />
                      </div>
                      <div style={{ fontSize: 15, color: "#9ca3af", fontFamily: "monospace", marginTop: 2 }}>{node.sub}</div>

          {Object.entries(EDGE_COLORS).map(([type, { color, label }]) => (
            <div key={type} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <svg width="20" height="3"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke={color} strokeWidth="2.5" strokeDasharray={type === "infra" ? "4,3" : "none"} /></svg>
              <span style={{ fontSize: 16.3, color: color, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 600 }}>{label}</span>
            </div>
          ))}
          <span style={{ width: 1, height: 16, background: "#1f2937", margin: "0 4px" }} />

            <div key={s} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <StatusDot status={s} size={7} />

            </div>
          ))}
        </div>
        <div style={{ flex: 1, overflow: "hidden" }}>
          <svg width="100%" height="100%" viewBox="0 0 800 575" preserveAspectRatio="xMidYMid meet">

              <pattern id="g2" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.018)" strokeWidth="0.5" />
              </pattern>
              {Object.entries(EDGE_COLORS).map(([type, { color }]) => (
                <marker key={type} id={`a2-${type}`} viewBox="0 0 8 8" refX="7" refY="4" markerWidth="4" markerHeight="4" orient="auto">
                  <path d="M 0 0 L 8 4 L 0 8 z" fill={color} opacity="0.75" />

              ))}

const CATEGORY_COLORS = {
  security: "#ef4444", memory: "#a78bfa", integrations: "#f59e0b",
  llm: "#22c55e", testing: "#06b6d4", features: "#f472b6",
  services: "#38bdf8", bugfix: "#fb923c", refactor: "#6b7280",
  docs: "#d1d5db", infra: "#9ca3af", other: "#9ca3af", core: "#fbbf24",
};

function CommitsView({ commits: commitsProp, totalCommits, dataSource, lastFetch }) {
  const [filter, setFilter] = useState("all");
  const [allCommits, setAllCommits] = useState(commitsProp || COMMIT_DATA);
  const [loading, setLoading] = useState(false);
  const [page, setPage] = useState(1);
  const [hasMore, setHasMore] = useState(totalCommits ? totalCommits > (commitsProp || COMMIT_DATA).length : false);

  // Sync when prop changes (live refresh)
  useEffect(() => {
    if (commitsProp && page === 1) {
      setAllCommits(commitsProp);
      setHasMore(totalCommits ? totalCommits > commitsProp.length : false);
    }
  }, [commitsProp, totalCommits]);

  const loadMore = async () => {
    if (loading || !hasMore) return;
    setLoading(true);
    const nextPage = page + 1;
    try {
      const res = await fetch(`${DASHBOARD_API}/commits?page=${nextPage}&per_page=200`);
      if (res.ok) {
        const data = await res.json();
        // Sanitize loaded commits for public view
        if (data.commits) {
          data.commits = data.commits.map(c => ({
            ...c,
            paths: [],
            stats: c.stats ? c.stats.split(',')[0] || '' : '',
          }));
        }
        if (data.commits && data.commits.length > 0) {
          setAllCommits(prev => [...prev, ...data.commits]);
          setPage(nextPage);
          setHasMore(data.has_more);
        } else {
          setHasMore(false);
        }
      }
    } catch (e) {
      setHasMore(false);
    } finally {
      setLoading(false);
    }
  };

  const commits = allCommits;

  const filtered = filter === "all" ? commits : commits.filter(c => c.category === filter);
  const categories = [...new Set(commits.map(c => c.category))];
  const catCounts = {};
  commits.forEach(c => { catCounts[c.category] = (catCounts[c.category] || 0) + 1; });

  // Group by date
  const grouped = {};
  filtered.forEach(c => {
    const day = c.date.split("T")[0];
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(c);
  });

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px" }}>
      {/* Header info */}
      <div style={{ display: "flex", gap: 10, marginBottom: 14, alignItems: "stretch" }}>
        <div style={{ background: "#0f1117", border: "1px solid #1f2937", borderTop: "2px solid #22c55e",
          borderRadius: 4, padding: "10px 16px", flex: 1 }}>
          <div style={{ fontSize: 15, color: "#22c55e", fontFamily: "'Barlow Condensed',sans-serif",
            letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 3 }}>Total Commits</div>
          <div style={{ fontSize: 45, fontWeight: 700, color: "#f9fafb", fontFamily: "'Barlow Condensed',sans-serif" }}>
            {totalCommits || commits.length}
          </div>
          <div style={{ fontSize: 14.4, color: "#d1d5db", fontFamily: "monospace" }}>
            {dataSource === "live" ? "live from VM" : "embedded snapshot"}{lastFetch ? ` · ${lastFetch.toLocaleTimeString()}` : ""}
          </div>
        </div>
        <div style={{ background: "#0f1117", border: "1px solid #1f2937", borderTop: "2px solid #a78bfa",
          borderRadius: 4, padding: "10px 16px", flex: 2 }}>
          <div style={{ fontSize: 15, color: "#a78bfa", fontFamily: "'Barlow Condensed',sans-serif",
            letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>By Category</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
            <button onClick={() => setFilter("all")} style={{
              padding: "2px 8px", borderRadius: 2, border: filter === "all" ? "1px solid #f59e0b" : "1px solid #1f2937",
              background: filter === "all" ? "#f59e0b18" : "transparent",
              color: filter === "all" ? "#f59e0b" : "#d1d5db", fontSize: 14.4, cursor: "pointer",
              fontFamily: "'Barlow Condensed',sans-serif" }}>ALL ({commits.length})</button>
            {categories.sort().map(cat => (
              <button key={cat} onClick={() => setFilter(filter === cat ? "all" : cat)} style={{
                padding: "2px 8px", borderRadius: 2,
                border: filter === cat ? `1px solid ${CATEGORY_COLORS[cat]}` : "1px solid #1f2937",
                background: filter === cat ? CATEGORY_COLORS[cat] + "18" : "transparent",
                color: filter === cat ? CATEGORY_COLORS[cat] : "#d1d5db", fontSize: 14.4, cursor: "pointer",
                fontFamily: "'Barlow Condensed',sans-serif" }}>
                {cat} ({catCounts[cat]})
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Daily Activity */}
      {(() => {
        const daily = {};
        commits.forEach(c => { const d = c.date.split("T")[0]; daily[d] = (daily[d]||0)+1; });
        const days = Object.entries(daily).sort((a,b) => a[0].localeCompare(b[0]));
        const maxDay = Math.max(...days.map(d => d[1]));
        return (
          <div style={{ background: "#0f1117", border: "1px solid #1f2937", borderTop: "2px solid #f59e0b",
            borderRadius: 4, padding: "10px 16px", marginBottom: 14 }}>
            <div style={{ fontSize: 15, color: "#f59e0b", fontFamily: "'Barlow Condensed',sans-serif",
              letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 8 }}>Daily Commit Activity</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 50 }}>
              {days.map(([day, count]) => (
                <div key={day} title={`${day}: ${count} commits`} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                  <div style={{ width: "100%", maxWidth: 18, height: `${(count/maxDay)*40}px`, minHeight: 2,
                    background: count > 15 ? "#f59e0b" : count > 8 ? "#22c55e" : "#9ca3af",
                    borderRadius: "2px 2px 0 0", transition: "height 0.3s" }} />
                  <span style={{ fontSize: 11.3, color: "#6b7280", transform: "rotate(-45deg)", whiteSpace: "nowrap",
                    transformOrigin: "center" }}>{day.slice(5)}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Commit Timeline */}
      {Object.entries(grouped).map(([date, dayCommits]) => (
        <div key={date} style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 16.3, color: "#f59e0b", fontFamily: "'Barlow Condensed',sans-serif",
            letterSpacing: "0.12em", marginBottom: 6, borderLeft: "2px solid #f59e0b33", paddingLeft: 8 }}>
            {date}
          </div>
          {dayCommits.map(c => (
            <div key={c.hash} style={{ display: "flex", gap: 10, padding: "6px 0 6px 10",
              borderBottom: "1px solid #111827", borderLeft: `2px solid ${CATEGORY_COLORS[c.category]}33` }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 55 }}>
                <span style={{ fontFamily: "monospace", fontSize: 16.9, color: "#f59e0b", fontWeight: 600 }}>{c.short}</span>
                <span style={{ fontSize: 12.5, color: CATEGORY_COLORS[c.category], background: CATEGORY_COLORS[c.category] + "18",
                  padding: "0 4px", borderRadius: 2 }}>{c.category}</span>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 17.5, color: "#e2e8f0", lineHeight: 1.4 }}>{c.subject}</div>
                <div style={{ display: "flex", gap: 10, marginTop: 3 }}>
                  <span style={{ fontSize: 14.4, color: "#9ca3af" }}>{c.author}</span>
                  <span style={{ fontSize: 14.4, color: "#9ca3af" }}>{c.stats}</span>
                  <span style={{ fontSize: 14.4, color: "#6b7280" }}>{c.date.split("T")[1]?.slice(0, 5)}</span>
                </div>
                {c.paths.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginTop: 3 }}>
                    {c.paths.slice(0, 5).map(p => (
                      <span key={p} style={{ fontSize: 12.5, color: "#6b7280", fontFamily: "monospace",
                        background: "#0a0d12", padding: "1px 4px", borderRadius: 2 }}>{p.split("/").pop()}</span>
                    ))}
                    {c.paths.length > 5 && <span style={{ fontSize: 12.5, color: "#6b7280" }}>+{c.paths.length - 5} more</span>}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      ))}

      {/* Load More */}
      {hasMore && dataSource === "live" && (
        <div style={{ display: "flex", justifyContent: "center", padding: "12px 0" }}>
          <button onClick={loadMore} disabled={loading} style={{
            padding: "8px 24px", background: loading ? "#111" : "#f59e0b18",
            border: "1px solid #f59e0b44", borderRadius: 4, color: "#f59e0b",
            fontSize: 17.5, fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.1em",
            cursor: loading ? "wait" : "pointer", textTransform: "uppercase", fontWeight: 600 }}>
            {loading ? "Loading..." : `Load more (showing ${commits.length}${totalCommits ? ` of ${totalCommits}` : ""})`}
          </button>
        </div>
      )}
      {!hasMore && totalCommits && totalCommits > 200 && (
        <div style={{ textAlign: "center", padding: "8px 0", fontSize: 14.4, color: "#9ca3af" }}>
          All {commits.length} commits loaded
        </div>
      )}

    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION G — ROOT
// ═══════════════════════════════════════════════════════════════════════════

const TABS = [
  { id: "mission", label: "Mission Control", icon: "⬡" },
  { id: "arch",    label: "Architecture",    icon: "◈" },
  { id: "commits", label: "Commits",         icon: "◇" },
];

function MoltagentHQ() {
  const [tab, setTab] = useState("mission");
  const [pulse, setPulse] = useState(false);
  const [liveCommits, setLiveCommits] = useState(null);
  const [liveTotalCommits, setLiveTotalCommits] = useState(null);
  const [liveStatus, setLiveStatus] = useState(null);
  const [dataSource, setDataSource] = useState("embedded"); // "live" | "embedded" | "error"
  const [lastFetch, setLastFetch] = useState(null);

  useEffect(() => { const iv = setInterval(() => setPulse(p => !p), 2000); return () => clearInterval(iv); }, []);

  // Live data fetching
  useEffect(() => {
    let mounted = true;
    const fetchData = async () => {
      try {
        const [commitsRes, statusRes] = await Promise.allSettled([
          fetch(`${DASHBOARD_API}/commits?page=1&per_page=200`).then(r => r.ok ? r.json() : Promise.reject(r.status)),
          fetch(`${DASHBOARD_API}/status`).then(r => r.ok ? r.json() : Promise.reject(r.status)),
        ]);
        if (!mounted) return;
        if (commitsRes.status === "fulfilled" && commitsRes.value.commits) {
          const data = commitsRes.value;
          // Sanitize commits for public view: strip file paths and detailed stats
          if (data.commits) {
            data.commits = data.commits.map(c => ({
              ...c,
              paths: [],
              stats: c.stats ? c.stats.split(',')[0] || '' : '',
            }));
          }
          setLiveCommits(data.commits);
          setLiveTotalCommits(data.total);
          setDataSource("live");
          setLastFetch(new Date());
        }
        if (statusRes.status === "fulfilled" && !statusRes.value.error) {
          const statusData = statusRes.value;
          // Filter infrastructure details
          if (statusData.infrastructure) {
            statusData.infrastructure = statusData.infrastructure.map(i => ({
              name: i.name,
              status: i.status,
              role: i.role,
              detail: i.name === 'Moltagent VM' ? 'Hetzner Cloud \u00b7 EU jurisdiction'
                    : i.name === 'Ollama VM' ? 'Local LLM inference \u00b7 EU hosted'
                    : 'Hetzner Storage Share \u00b7 EU jurisdiction'
            }));
          }
          // Strip module line counts and file paths
          if (statusData.modules) {
            statusData.modules = statusData.modules.map(m => ({
              module: m.module,
              lines: null,
              file: null
            }));
          }
          if (statusData.guards) {
            statusData.guards = statusData.guards.map(g => ({
              name: g.name,
              status: g.status,
              lines: null,
              file: null
            }));
          }
          if (statusData.memory) {
            statusData.memory = statusData.memory.map(m => ({
              ...m,
              lines: null,
              commit: null
            }));
          }
          // Strip lines from features
          ['h1', 'h2', 'h3'].forEach(h => {
            if (statusData.features && statusData.features[h]) {
              statusData.features[h] = statusData.features[h].map(f => ({
                name: f.name,
                status: f.status
              }));
            }
          });
          setLiveStatus(statusData);
        }
        if (commitsRes.status === "rejected" && statusRes.status === "rejected") {
          setDataSource("embedded");
        }
      } catch (e) {
        if (mounted) setDataSource("embedded");
      }
    };
    fetchData();
    const iv = setInterval(fetchData, LIVE_REFRESH_INTERVAL);
    return () => { mounted = false; clearInterval(iv); };
  }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#060a0f",
      color: "#e2e8f0", fontFamily: "'JetBrains Mono',monospace", overflow: "hidden",
      backgroundImage: `linear-gradient(rgba(255,255,255,0.013) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.013) 1px,transparent 1px)`,
      backgroundSize: "40px 40px" }}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 20px", borderBottom: "1px solid #141e2b", background: "rgba(6,10,15,0.97)",
        backdropFilter: "blur(8px)", position: "sticky", top: 0, zIndex: 100, flexShrink: 0, height: 54 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 9, height: 9, borderRadius: "50%", background: "#22c55e",
            boxShadow: `0 0 ${pulse ? 12 : 5}px #22c55e`, transition: "box-shadow 1s" }} />
          <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontSize: 25, fontWeight: 700,
            letterSpacing: "0.12em", color: "#f9fafb" }}>MOLTAGENT</span>
          <span style={{ fontSize: 13.8, color: "#6b7280", letterSpacing: "0.2em",
            fontFamily: "'Barlow Condensed',sans-serif", textTransform: "uppercase" }}>
            Sovereign AI Platform
          </span>
          <span style={{ fontSize: 11, color: "#22c55e", background: "#052e16", padding: "2px 8px", borderRadius: 3, marginLeft: 8 }}>PUBLIC</span>
        </div>
        <div style={{ display: "flex", gap: 0, border: "1px solid #1a2030", borderRadius: 4, overflow: "hidden" }}>
          {TABS.map((t, i) => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding: "0 16px", height: 36, background: tab === t.id ? "#f59e0b18" : "transparent",
              border: "none", borderRight: i < TABS.length - 1 ? "1px solid #1a2030" : "none",
              color: tab === t.id ? "#f59e0b" : "#9ca3af", fontSize: 17.5,
              fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.12em",
              cursor: "pointer", textTransform: "uppercase", fontWeight: 600,
              transition: "all 0.18s", display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 18.8 }}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {/* Data source indicator */}
          <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "2px 8px",
            background: dataSource === "live" ? "#052e1622" : "#45180322",
            border: `1px solid ${dataSource === "live" ? "#22c55e33" : "#f59e0b33"}`,
            borderRadius: 3 }}>
            <div style={{ width: 5, height: 5, borderRadius: "50%",
              background: dataSource === "live" ? "#22c55e" : dataSource === "error" ? "#ef4444" : "#f59e0b",
              boxShadow: `0 0 4px ${dataSource === "live" ? "#22c55e" : "#f59e0b"}` }} />
            <span style={{ fontSize: 12.5, color: dataSource === "live" ? "#22c55e" : "#f59e0b",
              fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: "0.1em", textTransform: "uppercase" }}>
              {dataSource === "live" ? "LIVE" : "SNAPSHOT"}
            </span>
          </div>
          <Clock />
        </div>
      </div>

      {/* Content */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minHeight: 0 }}>
        {tab === "mission" && <MissionControl liveStatus={liveStatus} />}
        {tab === "arch"    && <ArchitectureView liveStatus={liveStatus} />}
        {tab === "commits" && <CommitsView commits={liveCommits || COMMIT_DATA} totalCommits={liveTotalCommits} dataSource={dataSource} lastFetch={lastFetch} />}
      </div>
      <div style={{ padding: "8px 20px", borderTop: "1px solid #141e2b", display: "flex", justifyContent: "space-between", fontSize: 11, color: "#6b7280", flexShrink: 0 }}>
        <span>Moltagent — Sovereign AI Agent Platform</span>
        <a href="https://moltagent.cloud" target="_blank" style={{ color: "#f59e0b", textDecoration: "none" }}>moltagent.cloud</a>
      </div>
    </div>
  );
}


ReactDOM.render(React.createElement(MoltagentHQ), document.getElementById("root"));

  </script>
</body>
</html>
